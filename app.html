<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
padding-bottom:80px;
}


.header{
background:#1877f2;
color:white;
padding:20px;
text-align:center;
}


.container{
padding:20px;
}


.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:18px;
box-shadow:0 2px 8px #ddd;
}


button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;

background:#1877f2;
color:white;
font-size:16px;
}


.nav{

position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #ddd;

}


.nav button{

width:auto;
background:none;
color:#1877f2;
padding:5px;

}


</style>

</head>


<body>


<div class="header">

<h1>🚀 GrowthMachineAI</h1>

<p>Your AI Growth Partner</p>

</div>



<div class="container">


<div class="card">

<h2>🤖 AI Creator</h2>

<p>
Generate viral content ideas instantly.
</p>

<button onclick="openTool('Content Generator')">
Create Content
</button>

</div>



<div class="card">

<h2>🔥 Trend Radar</h2>

<p>
Discover opportunities before others.
</p>

<button onclick="openTool('Trend Radar')">
Find Trends
</button>

</div>



<div class="card">

<h2>💰 Growth Coach</h2>

<p>
Get personalised strategy advice.
</p>

<button onclick="openTool('AI Coach')">
Ask Coach
</button>

</div>


</div>



<div class="nav">

<button>
🏠 Home
</button>

<button>
📊 Analytics
</button>

<button>
👤 Profile
</button>

</div>



<script>


function openTool(tool){

alert(
tool + " opening soon"
);

}


</script>


</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#1877f2">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
padding-bottom:80px;
}

.header{
background:#1877f2;
color:white;
padding:25px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:18px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;
border:0;
background:#1877f2;
color:white;
font-size:16px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
}

.nav button{
background:none;
color:#1877f2;
width:auto;
}

.install{
background:#111827;
}

</style>

</head>


<body>


<div class="header">

<h1>🚀 GrowthMachineAI</h1>

<p>Your AI Growth Partner</p>

</div>


<div class="container">


<div class="card">

<h2>🤖 AI Content Creator</h2>

<p>Create viral posts, captions and ideas.</p>

<button>
Create Content
</button>

</div>



<div class="card">

<h2>🔥 Trend Radar</h2>

<p>Discover opportunities and trends.</p>

<button>
Find Trends
</button>

</div>



<div class="card">

<h2>💰 Growth Coach</h2>

<p>Your AI marketing assistant.</p>

<button>
Ask Coach
</button>

</div>



<div class="card" id="installBox" style="display:none">

<h2>📲 Install App</h2>

<p>Add GrowthMachineAI to your home screen.</p>

<button class="install" id="installButton">
Install GrowthMachineAI
</button>

</div>


</div>



<div class="nav">

<button>🏠 Home</button>

<button>📊 Analytics</button>

<button>👤 Profile</button>

</div>



<script>


let deferredPrompt;


window.addEventListener(
"beforeinstallprompt",
(event)=>{

event.preventDefault();

deferredPrompt = event;


document.getElementById(
"installBox"
).style.display="block";


});


document.getElementById(
"installButton"
).onclick = async ()=>{


if(deferredPrompt){

deferredPrompt.prompt();

deferredPrompt=null;

}

};



if("serviceWorker" in navigator){

window.addEventListener(
"load",
()=>{

navigator.serviceWorker.register(
"/service-worker.js"
);

});

}


</script>


</body>

</html>

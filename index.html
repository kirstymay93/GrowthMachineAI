<!DOCTYPE html>
<html>
<head>

<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
}

.container {
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

h1 {
text-align:center;
}

input,button {
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;
font-size:16px;
}

button {
background:#1877f2;
color:white;
border:0;
}

.section {
background:#eeeeee;
padding:15px;
margin-top:15px;
border-radius:12px;
}

.copy {
background:#333;
}

.delete {
background:#d9534f;
}

</style>

</head>


<body>


<div class="container">


<h1>🚀 GrowthMachineAI</h1>

<p>
AI social media growth engine
</p>


<input id="topic" placeholder="Enter your topic">


<button onclick="generate()">
🤖 Generate Growth Package
</button>


<div id="output"></div>


<h2>📚 Saved Content</h2>

<div id="saved"></div>


</div>



<script>


function loadSaved(){

let items =
JSON.parse(localStorage.getItem("growthContent")) || [];


let box =
document.getElementById("saved");


box.innerHTML="";


items.forEach((item,index)=>{

box.innerHTML += `

<div class="section">

<p>${item}</p>

<button class="copy"
onclick="copyText(\`${item}\`)">
📋 Copy
</button>


<button class="delete"
onclick="deleteItem(${index})">
🗑 Delete
</button>

</div>

`;

});


}



function saveContent(text){

let items =
JSON.parse(localStorage.getItem("growthContent")) || [];


items.unshift(text);


localStorage.setItem(
"growthContent",
JSON.stringify(items)
);


loadSaved();

}



function deleteItem(index){

let items =
JSON.parse(localStorage.getItem("growthContent")) || [];


items.splice(index,1);


localStorage.setItem(
"growthContent",
JSON.stringify(items)
);


loadSaved();

}



async function copyText(text){

await navigator.clipboard.writeText(text);

alert("Copied!");

}




async function generate(){


let topic =
document.getElementById("topic").value;


if(!topic){

alert("Enter a topic");

return;

}


document.getElementById("output").innerHTML=
"🤖 Creating content...";


const response =
await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
topic
})

});


const data =
await response.json();


let content =
data.content || "No content generated";


document.getElementById("output").innerHTML=

`

<div class="section">

<h3>🔥 Generated Content</h3>

<p id="result">${content.replace(/\n/g,"<br>")}</p>


<button class="copy"
onclick="copyText(document.getElementById('result').innerText)">
📋 Copy
</button>


<button onclick="saveContent(document.getElementById('result').innerText)">
⭐ Save To Library
</button>


</div>

`;

}


loadSaved();


</script>


</body>
</html>

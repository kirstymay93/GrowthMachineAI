<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowthMachineAI</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.app{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

textarea,button{

width:100%;
padding:15px;
margin-top:12px;
border-radius:12px;
box-sizing:border-box;

}

textarea{
height:140px;
border:1px solid #ccc;
}

button{

background:#1877f2;
color:white;
border:0;
font-size:16px;
cursor:pointer;

}

.result{

margin-top:20px;
background:#eee;
padding:15px;
border-radius:12px;
white-space:pre-wrap;

}

</style>


<script type="module">


import { createClient } from
"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabase = createClient(

"https://domqqoskzxgkjtbtewir.supabase.co",

"YOUR_NEW_ANON_KEY"

);



const {
data:{session}

}=await supabase.auth.getSession();



if(!session){

window.location.href="auth.html";

}



window.logout = async()=>{

await supabase.auth.signOut();

window.location.href="auth.html";

};



window.latestResult="";



window.generate = async()=>{


const idea =
document.getElementById("idea").value;


if(!idea){

document.getElementById("result").textContent=
"Enter an idea first.";

return;

}



document.getElementById("result").textContent=
"🤖 Creating AI plan...";



try{


const response =
await fetch("/api/generate",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

idea

})

});



const data =
await response.json();



window.latestResult =
data.result || data.error;



document.getElementById("result").textContent =
window.latestResult;



}

catch(error){


document.getElementById("result").textContent =
"AI connection error.";

}



};





window.saveIdea = async()=>{


if(!window.latestResult){

document.getElementById("result").textContent=
"No AI result to save.";

return;

}



const {

data:{session}

}=await supabase.auth.getSession();



const {error}=

await supabase

.from("saved_ideas")

.insert({

user_id:session.user.id,

title:"AI Growth Plan",

content:window.latestResult

});



if(error){

document.getElementById("result").textContent=
"❌ "+error.message;

return;

}



document.getElementById("result").textContent=
"✅ Saved to your library.";

};





window.showSaved = async()=>{


const {

data,

error

}=await supabase

.from("saved_ideas")

.select("*")

.order(

"created_at",

{

ascending:false

}

);



if(error){

document.getElementById("result").textContent=
error.message;

return;

}



document.getElementById("result").textContent =

data.length

?

data.map(item=>

"📌 "+item.title+

"\n\n"+

item.content

)

.join(

"\n\n----------------\n\n"

)

:

"No saved ideas yet.";

};



</script>

</head>


<body>


<div class="app">


<h1>🚀 GrowthMachineAI</h1>


<textarea

id="idea"

placeholder="Describe your business, niche or content idea...">

</textarea>



<button onclick="generate()">

🤖 Generate AI Plan

</button>



<button onclick="saveIdea()">

💾 Save To Cloud Library

</button>



<button onclick="showSaved()">

📚 My Saved Ideas

</button>



<button onclick="logout()">

🚪 Logout

</button>



<div id="result" class="result">

Ready...

</div>



</div>


</body>

</html>

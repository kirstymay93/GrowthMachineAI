<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.app{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

textarea,button{

width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;

}

button{

background:#1877f2;
color:white;
border:0;

}

.box{

margin-top:20px;
background:#eee;
padding:15px;
border-radius:12px;
white-space:pre-wrap;

}

</style>

</head>


<body>


<div class="app">


<h1>🚀 GrowthMachineAI</h1>


<textarea id="idea"
placeholder="Enter your idea">
</textarea>


<button onclick="generate()">
🤖 Generate AI Plan
</button>


<button onclick="saveIdea()">
💾 Save Result
</button>


<button onclick="showSaved()">
📚 My Saved Ideas
</button>


<div id="result" class="box">
Ready...
</div>


</div>



<script>


let latest="";


async function generate(){


let idea =
document.getElementById("idea").value;


document.getElementById("result").innerHTML =
"🤖 Creating...";


let response =
await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
idea
})

});


let data =
await response.json();


latest =
data.result || data.error;


document.getElementById("result").innerHTML =
latest;


}



function saveIdea(){


if(!latest){

return;

}


let saved =
JSON.parse(
localStorage.getItem("savedIdeas") || "[]"
);


saved.push(latest);


localStorage.setItem(
"savedIdeas",
JSON.stringify(saved)
);


document.getElementById("result").innerHTML =
"✅ Saved!";


}



function showSaved(){


let saved =
JSON.parse(
localStorage.getItem("savedIdeas") || "[]"
);


document.getElementById("result").innerHTML =

saved.length ?

saved.join("\n\n---\n\n") :

"No saved ideas yet";


}


</script>


</body>

</html>

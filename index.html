<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:20px;
max-width:600px;
margin:auto;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#1877f2;
color:white;
border:0;
border-radius:10px;
font-size:16px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
padding:10px;
}

#result{
margin-top:20px;
background:#eee;
padding:15px;
border-radius:10px;
}

</style>

</head>


<body>


<div class="box">

<h1>🚀 GrowthMachineAI</h1>

<p>
Your AI growth assistant
</p>


<textarea id="idea"
placeholder="Enter your business idea or content idea">
</textarea>


<button onclick="createContent()">
🤖 Create Viral Content
</button>


<button onclick="createStrategy()">
📈 Create Growth Strategy
</button>


<div id="result">
Ready...
</div>


</div>



<script>


function createContent(){

let idea =
document.getElementById("idea").value;


document.getElementById("result").innerHTML =

`
🔥 Content Idea

Hook:
"Nobody is talking about this..."

Post:
${idea}

Call to action:
Follow for more ideas.
`;

}



function createStrategy(){

let idea =
document.getElementById("idea").value;


document.getElementById("result").innerHTML =

`
📈 Growth Plan

1. Create daily content about:
${idea}

2. Build an audience.

3. Improve engagement.

4. Monetise your followers.
`;

}


</script>


</body>

</html>

<!DOCTYPE html>
<html>
<head>

<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
font-family: Arial, sans-serif;
background:#f2f2f2;
padding:20px;
}

.container {
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

h1 {
text-align:center;
}

input, button {
width:100%;
padding:15px;
margin-top:12px;
border-radius:12px;
font-size:16px;
}

button {
background:#1877f2;
color:white;
border:0;
}

.section {
background:#eeeeee;
padding:15px;
margin-top:15px;
border-radius:12px;
}

.copy {
background:#333;
margin-top:8px;
}

</style>

</head>


<body>

<div class="container">

<h1>🚀 GrowthMachineAI</h1>

<p>
Your AI social media growth assistant
</p>


<input 
id="topic"
placeholder="Enter your content topic"
/>


<button onclick="generate()">
🤖 Generate Growth Package
</button>


<div id="output"></div>


</div>


<script>


async function copyText(text){

await navigator.clipboard.writeText(text);

alert("Copied!");

}



async function generate(){

let topic =
document.getElementById("topic").value;


if(!topic){

alert("Enter a topic");

return;

}


document.getElementById("output").innerHTML=
"<h3>🤖 Creating...</h3>";



const response = await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
topic
})

});



const data = await response.json();



let content =
data.content || "No result";



document.getElementById("output").innerHTML=

`

<div class="section">

<h3>🔥 AI Growth Package</h3>

<p id="text">${content.replace(/\n/g,"<br>")}</p>


<button class="copy"
onclick="copyText(document.getElementById('text').innerText)">
📋 Copy Everything
</button>


</div>

`;

}


</script>


</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.app{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

textarea,input{
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:0;
border-radius:12px;
background:#1877f2;
color:white;
font-size:16px;
}

.card{
background:#eee;
padding:15px;
margin-top:20px;
border-radius:12px;
white-space:pre-wrap;
}

</style>

</head>


<body>


<div class="app">


<h1>🚀 GrowthMachineAI</h1>

<p>
AI powered content and growth assistant
</p>


<textarea id="idea"
placeholder="Enter your idea, business or niche">
</textarea>


<button onclick="generate()">
🤖 Generate Content
</button>


<button onclick="strategy()">
📈 Growth Strategy
</button>


<button onclick="save()">
💾 Save Idea
</button>


<div id="result" class="card">
Ready...
</div>


</div>



<script>


function generate(){

let idea =
document.getElementById("idea").value;


document.getElementById("result").innerHTML =

`🔥 Viral Content

Hook:
Stop scrolling...

Post idea:
${idea}

Call to action:
Comment your thoughts.`;

}



function strategy(){

let idea =
document.getElementById("idea").value;


document.getElementById("result").innerHTML =

`📈 Growth Strategy

Niche:
${idea}

Daily:
• Create valuable posts
• Engage with followers
• Study trends
• Improve content

Goal:
Grow audience and monetise.`;

}



function save(){

let idea =
document.getElementById("idea").value;


let saved =
JSON.parse(localStorage.getItem("ideas") || "[]");


saved.push(idea);


localStorage.setItem(
"ideas",
JSON.stringify(saved)
);


document.getElementById("result").innerHTML =
"✅ Idea saved!";

}


</script>


</body>

</html>

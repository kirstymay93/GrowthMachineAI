<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthMachineAI</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.app{
max-width:700px;
margin:auto;
background:#fff;
padding:24px;
border-radius:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

textarea{
width:100%;
height:140px;
padding:12px;
margin-top:10px;
border-radius:12px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#1877f2;
color:white;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
background:#eee;
padding:15px;
border-radius:12px;
white-space:pre-wrap;
}
</style>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://domqqoskzxgkjtbtewir.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvbXFxb3Nrenhna2p0YnRld2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NDg5NzIsImV4cCI6MjA5OTEyNDk3Mn0.Yn0TuO6cpBDDhwrIn5SViRJgF_BdI6F2OF-fJ99rTns"
);

const {
data:{session}
}=await supabase.auth.getSession();

if(!session){
window.location.href="auth.html";
}

window.logout=async()=>{
await supabase.auth.signOut();
window.location.href="auth.html";
};

window.generate=async()=>{

const idea=document.getElementById("idea").value;

document.getElementById("result").textContent="🤖 Generating...";

try{

const response=await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({idea})
});

const data=await response.json();

window.latestResult=data.result||data.error||"No response";

document.getElementById("result").textContent=window.latestResult;

}catch(e){

document.getElementById("result").textContent="Error contacting AI.";

}

};

window.saveIdea=()=>{

if(!window.latestResult)return;

const saved=JSON.parse(localStorage.getItem("savedIdeas")||"[]");

saved.push(window.latestResult);

localStorage.setItem(
"savedIdeas",
JSON.stringify(saved)
);

document.getElementById("result").textContent="✅ Saved";

};

window.showSaved=()=>{

const saved=JSON.parse(localStorage.getItem("savedIdeas")||"[]");

document.getElementById("result").textContent=
saved.length
? saved.join("\n\n----------------\n\n")
: "No saved ideas.";

};

</script>

</head>

<body>

<div class="app">

<h1>🚀 GrowthMachineAI</h1>

<textarea
id="idea"
placeholder="Describe your business, niche or content idea...">
</textarea>

<button onclick="generate()">
🤖 Generate AI Plan
</button>

<button onclick="saveIdea()">
💾 Save Result
</button>

<button onclick="showSaved()">
📚 My Saved Ideas
</button>

<button onclick="logout()">
🚪 Logout
</button>

<div id="result">
Ready.
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.app{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

textarea,button{

width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;

}

button{

background:#1877f2;
color:white;
border:0;
font-size:16px;

}

.result{

margin-top:20px;
background:#eee;
padding:15px;
border-radius:12px;
white-space:pre-wrap;

}

</style>

</head>


<body>


<div class="app">

<h1>🚀 GrowthMachineAI</h1>

<p>AI powered growth assistant</p>


<textarea id="idea"
placeholder="Enter your business or content idea">
</textarea>


<button onclick="generate()">
🤖 Generate AI Growth Plan
</button>


<div id="result" class="result">
Ready...
</div>


</div>



<script>

async function generate(){


let idea =
document.getElementById("idea").value;


document.getElementById("result").innerHTML =
"🤖 Creating...";


let response =
await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
idea
})

});


let data =
await response.json();


document.getElementById("result").innerHTML =
data.result || data.error;


}

</script>


</body>

</html>

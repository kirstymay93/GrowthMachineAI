<!DOCTYPE html>
<html>
<head>
<title>GrowthMachineAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  padding:20px;
}

.card {
  max-width:600px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

input, button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  font-size:16px;
}

button {
  background:#1877f2;
  color:white;
  border:none;
}

button:active {
  transform:scale(.98);
}

.result {
  margin-top:20px;
  padding:15px;
  background:#eee;
  border-radius:10px;
}

h1 {
  text-align:center;
}
</style>

</head>

<body>

<div class="card">

<h1>🚀 GrowthMachineAI</h1>

<p>
AI-powered Facebook growth assistant
</p>

<input 
id="topic"
placeholder="Enter your topic"
/>

<button onclick="generate()">
Generate Viral Content
</button>

<div id="result" class="result"></div>

</div>


<script>

async function generate(){

const topic=document.getElementById("topic").value;

if(!topic){
alert("Enter a topic");
return;
}


document.getElementById("result").innerHTML=
"🤖 Creating content...";


try {

const response = await fetch("/api/generate", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
topic:topic
})

});


const data = await response.json();


document.getElementById("result").innerHTML=`

<h3>🔥 Viral Ideas</h3>

<p>
${data.ideas.join("<br><br>")}
</p>


<h3>✍️ Caption</h3>

<p>
${data.caption}
</p>


<h3>#️⃣ Hashtags</h3>

<p>
${data.hashtags}
</p>

`;

}

catch(error){

document.getElementById("result").innerHTML=
"❌ Error connecting to AI engine";

}

}

</script>

</body>
</html>

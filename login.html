<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.card{
max-width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

input,button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;
font-size:16px;
}

button{
background:#1877f2;
color:white;
border:0;
}

</style>

</head>


<body>


<div class="card">

<h1>🚀 GrowthMachineAI</h1>

<h2>Account</h2>


<input id="email" placeholder="Email">


<input id="password" type="password" placeholder="Password">


<button onclick="signup()">
Create Account
</button>


<button onclick="login()">
Login
</button>


<p id="message"></p>


</div>


<script type="module">

import { createClient } from
"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabase =
createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_ANON_KEY"
);



window.signup = async function(){


const email =
document.getElementById("email").value;


const password =
document.getElementById("password").value;



const {error} =
await supabase.auth.signUp({

email,
password

});



document.getElementById("message").innerHTML =
error ? error.message :
"Account created. Check your email.";

}




window.login = async function(){


const email =
document.getElementById("email").value;


const password =
document.getElementById("password").value;



const {error} =
await supabase.auth.signInWithPassword({

email,
password

});



document.getElementById("message").innerHTML =
error ? error.message :
"Login successful!";

}


</script>


</body>

</html>

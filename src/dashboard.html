<!DOCTYPE html>
<html>

<head>

<title>GrowthMachineAI Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
}

.card{
background:#eee;
padding:15px;
margin-top:15px;
border-radius:12px;
}

button{
padding:12px;
border-radius:10px;
border:0;
background:#1877f2;
color:white;
}

</style>

</head>


<body>


<div class="container">


<h1>🚀 GrowthMachineAI</h1>

<h2>User Dashboard</h2>


<div class="card">

<h3>👤 Profile</h3>

<p id="user">
Loading user...
</p>

</div>



<div class="card">

<h3>📚 Your AI Content Library</h3>

<div id="library">
Loading content...
</div>

</div>



<button onclick="logout()">
Logout
</button>


</div>



<script type="module">


import { supabase } 
from "./supabase.js";



async function loadUser(){


const {
data:{user}
} =
await supabase.auth.getUser();



if(user){

document.getElementById("user").innerHTML =
user.email;

}


}



async function loadContent(){


const {
data:{user}
} =
await supabase.auth.getUser();



if(!user){

return;

}



const {data,error}=

await supabase
.from("content_library")
.select("*")
.order(
"created_at",
{
ascending:false
}
);



if(error){

document.getElementById("library").innerHTML =
error.message;

return;

}



document.getElementById("library").innerHTML =

data.map(item=>`

<div class="card">

<b>${item.topic}</b>

<p>${item.content}</p>

</div>

`).join("");



}



async function logout(){

await supabase.auth.signOut();

window.location.href="login.html";

}



window.logout=logout;


loadUser();

loadContent();


</script>


</body>

</html>
